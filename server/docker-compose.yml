volumes:
  prometheus_data: {}
  grafana_data: {}
  mongo_data: {}
  redis_data: {}

services:
  server:
    container_name: wordgrid-server
    build:
      context: https://github.com/wordgrid-game/wordgrid.git
      dockerfile: server/Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MATCHMAKING_PORT=3000
      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongodb:27017/matchmaking
    depends_on:
      - redis
      - mongodb

  redis:
    image: redis:7-alpine
    container_name: wordgrid-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  mongodb:
    image: mongo:7.0
    container_name: wordgrid-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  prometheus:
    image: prom/prometheus:latest
    container_name: wordgrid-prometheus
    restart: unless-stopped
    volumes:
      - ./server/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "1256:1256"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.listen-address=:1256'
    depends_on:
      - server

  grafana:
    image: grafana/grafana:latest
    container_name: wordgrid-grafana
    restart: unless-stopped
    ports:
      - "4328:4328"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_HTTP_PORT=4328
