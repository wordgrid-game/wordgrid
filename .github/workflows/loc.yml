name: Generate LoC Badge

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-badge:
    runs-on: ubuntu-latest
    name: Generate LoC Badge
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate LoC Badge
        uses: shadowmoose/GHA-LoC-Badge@1.0.0
        id: badge
        with:
          debug: true
          directory: ./
          badge: ./output/badge.svg
          ignore: 'node_modules|\.git|\.github|\.vscode|\.idea|dist|build|out|coverage|\.cache|\.next|\.nuxt|\.parcel-cache|\.vercel|\.vercel_build_output|\.vercel_output|*.png|*.jpg|*.jpeg|*.gif|*.bmp|*.tiff|*.ico|*.svg|*.webp|*.mp4|*.mov|*.avi|*.mkv|*.flv|*.wmv|*.mp3|*.wav|*.flac|*.aac|*.ogg|*.txt|*.md|*.json|*.yml|*.yaml|*.toml|*.ini|*.cfg|*.conf|*.log|*.lock|*.db|*.sqlite|*.sqlite3|*.sql|*.bak|*.tmp|*.swp|*.swo|*.DS_Store'
          badge_label: lines

      - name: Print the output
        run: |
          echo "Scanned: ${{ steps.badge.outputs.counted_files }}";
          echo "Line Count: ${{ steps.badge.outputs.total_lines }}";

      - name: Deploy to image-data branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: ./output
          publish_branch: image-data
          github_token: ${{ secrets.GITHUB_TOKEN }}
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
