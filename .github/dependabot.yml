version: 2
updates:
  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/server"
    schedule:
      interval: "weekly"
    groups:
      deps:
        applies-to: version-updates
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      minor-and-patch:
        applies-to: security-updates
        patterns:
          - "*"
        update-types:
          - "patch"
          - "minor"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
